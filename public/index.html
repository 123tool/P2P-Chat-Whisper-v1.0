<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAN-Whisper | Anonymous P2P</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d0d; color: #e0e0e0; font-family: 'Inter', sans-serif; }
        .neo-card { border: 3px solid #333; box-shadow: 8px 8px 0px #1a1a1a; transition: 0.2s; }
        .message { word-wrap: break-word; max-width: 85%; }
        .system-msg { color: #ff3e3e; font-family: monospace; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen">
    <header class="p-4 border-b-4 border-[#1a1a1a] flex justify-between items-center bg-[#0d0d0d]">
        <h1 class="text-xl font-black tracking-tighter text-red-600">LAN-WHISPER <span class="text-xs text-gray-500 font-normal">v1.0</span></h1>
        <div id="status" class="text-xs font-mono px-2 py-1 bg-green-900 text-green-400 border border-green-400">ENCRYPTED L-P2P</div>
    </header>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 bg-[radial-gradient(#1a1a1a_1px,transparent_1px)] [background-size:20px_20px]"></main>

    <footer class="p-4 bg-[#0d0d0d] border-t-4 border-[#1a1a1a]">
        <div class="flex gap-2 flex-wrap mb-2">
            <input type="file" id="file-input" class="hidden" onchange="handleFile(this)">
            <button onclick="document.getElementById('file-input').click()" class="neo-card bg-gray-800 px-3 py-1 text-xs font-bold hover:bg-gray-700">ATTACH FILE</button>
        </div>
        <div class="flex gap-2">
            <input type="text" id="input" autocomplete="off" placeholder="Tulis pesan rahasia..." 
                class="flex-1 neo-card bg-[#1a1a1a] p-3 outline-none focus:border-red-600">
            <button onclick="sendMessage()" class="neo-card bg-red-600 text-black font-black px-6 hover:bg-red-500 active:translate-y-1 active:shadow-none">SEND</button>
        </div>
    </footer>

    <script>
        const socket = io();
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('input');

        function sendMessage() {
            if (input.value) {
                socket.emit('chat message', { type: 'text', content: input.value });
                input.value = '';
            }
        }

        function handleFile(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                socket.emit('chat message', {
                    type: 'file',
                    fileName: file.name,
                    fileType: file.type,
                    content: e.target.result
                });
            };
            reader.readAsDataURL(file);
        }

        socket.on('chat message', (data) => {
            const div = document.createElement('div');
            div.className = "message neo-card p-3 bg-[#161616] animate-in fade-in duration-300";
            
            if (data.type === 'text') {
                div.innerHTML = `<p class="text-sm font-medium">${data.content}</p>`;
            } else if (data.type === 'file') {
                if (data.fileType.startsWith('image/')) {
                    div.innerHTML = `<img src="${data.content}" class="rounded mb-2 max-h-64">`;
                } else if (data.fileType.startsWith('audio/')) {
                    div.innerHTML = `<audio controls src="${data.content}" class="w-full"></audio>`;
                } else {
                    div.innerHTML = `<a href="${data.content}" download="${data.fileName}" class="text-blue-400 underline italic">Download: ${data.fileName}</a>`;
                }
            }
            
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        input.addEventListener("keypress", (e) => { if(e.key === "Enter") sendMessage(); });
    </script>
</body>
</html>
